<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luma Dashboard - Tokens</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 25px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 {
        color: #00d4ff;
        font-size: 28px;
      }
      .subtitle {
        color: #a0a0a0;
        font-size: 14px;
        margin-top: 5px;
      }

      .menu-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: center;
      }
      .tab-btn {
        background: #0f3460;
        border: none;
        padding: 12px 40px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        color: white;
        transition: all 0.3s;
        text-decoration: none;
        display: inline-block;
      }
      .tab-btn.active {
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: #1a1a2e;
      }
      .tab-btn:hover:not(.active) {
        background: #1a4a7a;
      }

      .stats-grid {
        display: flex;
        gap: 20px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .stat-card {
        background: #0f3460;
        border-radius: 10px;
        padding: 20px 30px;
        text-align: center;
        min-width: 150px;
      }
      .stat-value {
        font-size: 32px;
        font-weight: bold;
        color: #00d4ff;
      }
      .stat-label {
        color: #a0a0a0;
        font-size: 12px;
        margin-top: 8px;
      }

      .add-section {
        background: #0f3460;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 25px;
      }
      .section-title {
        font-size: 18px;
        margin-bottom: 15px;
        color: #00d4ff;
        border-left: 3px solid #00d4ff;
        padding-left: 10px;
      }
      .input-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .input-group input {
        flex: 1;
        padding: 10px;
        border: 1px solid #2a2a4a;
        border-radius: 8px;
        background: #1a1a2e;
        color: white;
        font-size: 14px;
      }
      .input-group input:focus {
        outline: none;
        border-color: #00d4ff;
      }

      button {
        background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
      }
      button.danger {
        background: linear-gradient(135deg, #ff4757 0%, #cc0033 100%);
      }
      button.warning {
        background: linear-gradient(135deg, #ffa502 0%, #cc7b00 100%);
      }
      button.small {
        padding: 6px 12px;
        font-size: 12px;
      }

      .table-container {
        background: #0f3460;
        border-radius: 15px;
        padding: 20px;
        overflow-x: auto;
      }
      .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        padding: 14px 12px;
        background: rgba(0, 212, 255, 0.1);
        color: #00d4ff;
        font-weight: 600;
        font-size: 14px;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: #e0e0e0;
        font-size: 13px;
        vertical-align: middle;
      }
      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: bold;
      }
      .badge.active {
        background: rgba(0, 255, 0, 0.2);
        color: #00ff00;
      }
      .badge.inactive {
        background: rgba(255, 0, 0, 0.2);
        color: #ff4444;
      }
      .badge.warning {
        background: rgba(255, 165, 0, 0.2);
        color: #ffa502;
      }

      .usage-bar-container {
        background: #1a1a2e;
        border-radius: 10px;
        height: 6px;
        width: 100px;
        overflow: hidden;
      }
      .usage-bar-fill {
        background: #00d4ff;
        height: 100%;
        border-radius: 10px;
      }
      .usage-bar-fill.danger {
        background: #ff4757;
      }
      .usage-bar-fill.warning {
        background: #ffa502;
      }

      .token-code {
        font-family: monospace;
        font-size: 12px;
        max-width: 400px;
        word-break: break-all;
      }
      .action-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: nowrap;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        z-index: 9999;
        animation: slideIn 0.3s ease;
        font-size: 14px;
        font-weight: 500;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .refresh-info {
        text-align: right;
        font-size: 11px;
        color: #6c8db0;
        margin-top: 15px;
        padding-top: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .select-all-container {
        margin-bottom: 15px;
        padding: 10px;
        background: rgba(0, 212, 255, 0.1);
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🔑 Luma Dashboard - Tokens</h1>
        <p class="subtitle">Manage API Tokens</p>
      </div>

      <div class="menu-tabs">
        <a href="/token.html" class="tab-btn active">🔑 Tokens</a>
        <a href="/cities.html" class="tab-btn">🏙️ Cities</a>
      </div>

      <div id="tokensSection">
        <div class="stats-grid" id="tokenStats"></div>
        <div class="add-section">
          <h3 class="section-title">➕ Add New Token</h3>
          <div class="input-group">
            <input
              type="text"
              id="newTokenInput"
              placeholder="Enter Apify API token..."
            />
            <button onclick="addToken()">Add Token</button>
            <button onclick="checkAllTokens()" class="warning">
              Check All
            </button>
          </div>
        </div>
        <div class="table-container">
          <div class="table-header">
            <h3 class="section-title" style="margin-bottom: 0">
              📋 Token List
            </h3>
            <button onclick="loadTokens()" class="small">🔄 Refresh</button>
          </div>
          <div id="tokensTable">Loading...</div>
          <div class="refresh-info" id="tokenLastUpdate"></div>
        </div>
      </div>
    </div>

    <script>
      async function loadTokenStats() {
        try {
          const res = await fetch("/api/tokens");
          const result = await res.json();
          if (result.success) {
            let active = 0,
              inactive = 0;
            for (const t of result.data) {
              if (t.is_limit_exceeded) inactive++;
              else active++;
            }
            document.getElementById("tokenStats").innerHTML =
              '<div class="stat-card"><div class="stat-value">' +
              result.data.length +
              '</div><div class="stat-label">Total Tokens</div></div><div class="stat-card"><div class="stat-value">' +
              active +
              '</div><div class="stat-label">Active Tokens</div></div><div class="stat-card"><div class="stat-value">' +
              inactive +
              '</div><div class="stat-label">Inactive Tokens</div></div>';
          }
        } catch (err) {
          console.error(err);
        }
      }

      async function loadTokens() {
        try {
          const res = await fetch("/api/tokens");
          const result = await res.json();
          if (result.success) {
            renderTokenTable(result.data);
            document.getElementById("tokenLastUpdate").innerHTML =
              "Last updated: " + new Date().toLocaleString();
          }
        } catch (err) {
          document.getElementById("tokensTable").innerHTML =
            '<div style="text-align:center;padding:40px;">Error loading tokens</div>';
        }
      }

      function renderTokenTable(tokens) {
        if (!tokens || tokens.length === 0) {
          document.getElementById("tokensTable").innerHTML =
            '<div style="text-align:center;padding:40px;">No tokens found. Add your first token above.</div>';
          return;
        }

        let html =
          '<div class="select-all-container" style="margin-bottom:0;"><span>📋 Token Management</span></div><table><thead><tr><th style="width:5%;">ID</th><th style="width:45%;">Token</th><th style="width:12%;">Status</th><th style="width:18%;">Usage (USD)</th><th style="width:20%;">Actions</th></tr></thead><tbody>';

        for (let i = 0; i < tokens.length; i++) {
          const t = tokens[i];
          const isInactive = t.is_limit_exceeded;
          const usagePercent = (t.current_usage / 4.9) * 100;
          let fillClass = "";
          let statusText = "ACTIVE";
          let statusClass = "active";

          if (isInactive) {
            statusText = "INACTIVE";
            statusClass = "inactive";
            fillClass = "danger";
          } else if (usagePercent >= 80) {
            statusText = "NEAR LIMIT";
            statusClass = "warning";
            fillClass = "warning";
          }

          const displayToken =
            t.token.length > 50 ? t.token.substring(0, 50) + "..." : t.token;
          const safeToken = t.token.replace(/'/g, "\\'");

          html += "<tr>";
          html += '<td style="padding:12px;">' + t.id + "</td>";
          html +=
            '<td class="token-code"><code>' + displayToken + "</code></td>";
          html +=
            '<td style="padding:12px;"><span class="badge ' +
            statusClass +
            '">' +
            statusText +
            "</span></td>";
          html +=
            '<td style="padding:12px;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;">' +
            (t.current_usage || 0).toFixed(6) +
            ' / 4.90</span><div class="usage-bar-container"><div class="usage-bar-fill ' +
            fillClass +
            '" style="width: ' +
            Math.min(usagePercent, 100) +
            '%"></div></div></div></td>';
          html +=
            '<td style="padding:12px;"><div class="action-buttons"><button class="small" onclick="copyToken(\'' +
            safeToken +
            '\')">📋 Copy</button><button class="small danger" onclick="deleteToken(' +
            t.id +
            ')">🗑️ Delete</button></div></td>';
          html += "</tr>";
        }

        html += "</tbody></table>";
        document.getElementById("tokensTable").innerHTML = html;
      }

      function copyToken(token) {
        navigator.clipboard
          .writeText(token)
          .then(() => showToast("✅ Token copied!", "success"));
      }

      async function addToken() {
        const token = document.getElementById("newTokenInput").value.trim();
        if (!token) return showToast("Enter a token", "error");
        showToast("Adding...", "info");
        const res = await fetch("/api/tokens", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const result = await res.json();
        if (result.success) {
          showToast("Token added!", "success");
          document.getElementById("newTokenInput").value = "";
          loadTokens();
          loadTokenStats();
        } else {
          showToast(result.error, "error");
        }
      }

      async function checkAllTokens() {
        showToast("Checking tokens...", "info");
        await fetch("/api/tokens/check-all", { method: "POST" });
        showToast("Checked!", "success");
        loadTokens();
        loadTokenStats();
      }

      async function deleteToken(id) {
        if (!confirm("Delete this token?")) return;
        await fetch("/api/tokens/" + id, { method: "DELETE" });
        showToast("Token deleted", "success");
        loadTokens();
        loadTokenStats();
      }

      function showToast(msg, type) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.textContent = msg;
        toast.style.background =
          type === "success"
            ? "#28a745"
            : type === "error"
              ? "#dc3545"
              : "#ffc107";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      loadTokens();
      loadTokenStats();
    </script>
  </body>
</html>
